workflows:
  android-workflow:
    name: Lebonprix 237 - Build Android
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Régénérer le dossier android/ (manquant dans le dépôt)
        script: |
          flutter create --platforms=android --org com.eliteempire .
      - name: Corriger le compileSdk pour tous les plugins (fix AAR metadata)
        script: |
          if [ -f android/build.gradle ]; then
            echo "" >> android/build.gradle
            echo "subprojects {" >> android/build.gradle
            echo "    afterEvaluate { proj ->" >> android/build.gradle
            echo "        if (proj.hasProperty('android')) {" >> android/build.gradle
            echo "            proj.android {" >> android/build.gradle
            echo "                compileSdkVersion 36" >> android/build.gradle
            echo "            }" >> android/build.gradle
            echo "        }" >> android/build.gradle
            echo "    }" >> android/build.gradle
            echo "}" >> android/build.gradle
          fi
      - name: Installer les dépendances
        script: |
          flutter pub get
      - name: Compiler l'APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
