workflows:
  android-workflow:
    name: Lebonprix 237 - Build Android
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Régénérer le dossier android/ (manquant dans le dépôt)
        script: |
          flutter create --platforms=android --org com.eliteempire .
      - name: Corriger le compileSdk pour tous les plugins (fix AAR metadata)
        script: |
          if [ -f android/build.gradle ]; then
            cat >> android/build.gradle << 'EOF'

subprojects {
    afterEvaluate { proj ->
        if (proj.hasProperty('android')) {
            proj.android {
                compileSdkVersion 36
            }
        }
    }
}
EOF
          fi
      - name: Installer les dépendances
        script: |
          flutter pub get
      - name: Compiler l'APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
